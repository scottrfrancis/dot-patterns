# Pattern-library release profile — TEMPLATE.
#
# Copy to  ~/.config/patterns/profiles/<generic-name>.conf  and fill in.
# The <generic-name> is a HANDLE you choose (e.g. "clone-target-a", "airgap-1") — it must
# NOT be a real client/employer/host name. Real identifiers live only in the SCRUBLIST
# this profile points at, which is also local and uncommitted. This .example ships only
# placeholders and is safe to commit.
#
# Then:  release.sh --profile <generic-name> [--go]

# Overlay to include on top of base/ (= visibility tag). Empty = base only (like 'public').
OVERLAY=""

# The black/white/gray list guarding THIS boundary (per-destination scrub profile).
SCRUBLIST="$HOME/.config/patterns/scrublist.<generic-name>"

# Delivery method:
#   sync   — rsync base/ to a git-mirror checkout (off-LAN, clone-capable targets)
#   bundle — self-extracting one-way .ps1 (near-air-gapped, receive-only sinks)
METHOD="sync"

# For METHOD=sync: where to sync (a local mirror checkout path or a mounted remote).
DEST=""

# ── Built-in profile (no conf needed): 'public' → base only, sync to the public mirror,
#    gated by ~/.config/patterns/scrublist.public. Its DEST is passed at run time or set
#    in a public.conf here.
